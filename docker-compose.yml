version: "3.8"

services:
  vpn-web:
    image: python:3.12-slim
    container_name: openvpn-web
    ports:
      - "9192:9192"
    volumes:
      - ./app:/app
      - ./openvpn-data:/etc/openvpn
    working_dir: /app
    command: python app.py
    cap_add:
      - NET_ADMIN
    restart: unless-stopped