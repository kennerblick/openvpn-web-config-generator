<!doctype html><html><head><meta charset=utf-8><title>VPN Generator</title><link rel=stylesheet href="/static/style.css"></head><body><h1>OpenVPN Generator</h1><form id=f><input name=server_ip placeholder="Server IP" required><input name=client value=clientname><select name=proto><option value=udp>UDP</option><option value=tcp>TCP</option></select><input name=port value=1194><button>Erstellen</button></form><div id=s></div><script>f.onsubmit=e=>{e.preventDefault();fetch('/create',{method:'POST',body:new FormData(f)});poll()};async function poll(){let r=await fetch('/status'),d=await r.json();s.innerText=d.message+' '+(d.progress||'');if(d.state=='done'){s.innerHTML+=`<br><a href=/download/${d.server}>server.conf</a><br><a href=/download/${d.client}>client.ovpn</a>`;return}setTimeout(poll,500)}</script></body></html>
